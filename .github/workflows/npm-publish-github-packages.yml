name: Publish to npm

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Opt the bundled JS actions into the Node 24 runtime (clears the Node 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test

  publish:
    needs: test
    # Only publishes when you manually trigger this workflow ("Run workflow" in the Actions tab).
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # Configure auth on pnpm's OWN config (pnpm doesn't reliably read the temp
      # .npmrc that setup-node writes), then verify the token actually authenticates.
      - name: Configure npm auth and verify identity
        run: |
          pnpm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          echo "Authenticated on npm as: $(pnpm whoami --registry https://registry.npmjs.org || echo '*** NOT AUTHENTICATED — check the NPM_TOKEN secret ***')"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish packages
        run: pnpm -r --filter "./packages/*" publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
