name: Publish

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Opt the bundled JS actions into the Node 24 runtime (clears the Node 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test

  # One parallel job per package → npmjs.com.
  publish-npm:
    name: npm (${{ matrix.package }})
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [react, svelte]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # `-r` skips the package if this version is already published.
      - name: Publish @dialog-fn/${{ matrix.package }}
        run: pnpm -r --filter "@dialog-fn/${{ matrix.package }}" publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # One parallel job per package → GitHub Packages. Best-effort: ignored if it isn't set up.
  publish-gpr:
    name: GitHub Packages (${{ matrix.package }})
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package: [react, svelte]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Configure GitHub Packages auth
        run: |
          echo "@dialog-fn:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish @dialog-fn/${{ matrix.package }}
        run: pnpm -r --filter "@dialog-fn/${{ matrix.package }}" publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
