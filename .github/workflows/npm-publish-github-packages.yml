name: Publish to npm

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Opt the bundled JS actions into the Node 24 runtime (clears the Node 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test

  publish:
    needs: test
    # Only publishes when you manually trigger this workflow ("Run workflow" in the Actions tab).
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # Write the token to a root .npmrc (the most reliable place for pnpm to read it),
      # then verify it actually authenticates before attempting to publish.
      - name: Configure npm auth and verify identity
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          echo "npm identity: $(pnpm whoami --registry https://registry.npmjs.org || echo '*** 401 — the NPM_TOKEN secret is not a valid npm token (regenerate it) ***')"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish packages
        run: pnpm -r --filter "./packages/*" publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
